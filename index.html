<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Свобода</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F2A84E">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --sky-top: #EAF6FC;
    --sky-bottom: #FFF8EE;
    --card: #FFFFFF;
    --text: #3A4750;
    --text-dim: #8A98A0;
    --sun: #F2A84E;
    --sun-soft: #FBE4C4;
    --mint: #6FBE93;
    --mint-soft: #DCF0E4;
    --sky: #6FA8C9;
    --coral: #E8836B;
    --coral-soft: #FBE0D8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(60% 40% at 15% 8%, rgba(255,255,255,.9), transparent 60%),
      radial-gradient(50% 30% at 85% 4%, rgba(255,255,255,.7), transparent 60%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
    background-attachment: fixed;
    color:var(--text);
    font-family:'Inter', system-ui, sans-serif;
    padding:24px 16px 50px;
    min-height:100vh;
  }
  .wrap{max-width:480px; margin:0 auto;}
  header{margin-bottom:26px; text-align:center;}
  header .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--sky);
    font-weight:600;
    margin-bottom:6px;
  }
  header h1{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:32px;
    margin:0;
    color:#2E3944;
  }

  .card{
    background:var(--card);
    border-radius:26px;
    padding:24px 20px;
    margin-bottom:20px;
    box-shadow: 0 10px 30px -12px rgba(58,71,80,0.15);
  }

  .card-head{display:flex; align-items:center; gap:8px; margin-bottom:16px;}
  .card-head .icon{font-size:20px;}
  .card-title{
    font-family:'Quicksand', sans-serif;
    font-weight:600;
    font-size:15px;
    color:var(--text);
    margin:0;
  }

  /* Quote strip */
  .quote{
    font-size:13px;
    line-height:1.5;
    color:var(--text-dim);
    font-style:italic;
    padding:12px 14px;
    border-radius:14px;
    margin-bottom:18px;
  }
  .quote.sun-bg{background:var(--sun-soft);}
  .quote.mint-bg{background:var(--mint-soft);}

  /* Nicotine hero */
  .streak-hero{
    display:flex; align-items:baseline; justify-content:center; gap:8px;
    padding:6px 0 4px;
  }
  .streak-num{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:58px;
    line-height:1;
    color:#2E3944;
    font-variant-numeric: tabular-nums;
  }
  .streak-unit{
    font-size:14px;
    color:var(--text-dim);
    font-weight:500;
  }
  .streak-sub{
    text-align:center;
    font-size:12px;
    color:var(--text-dim);
    margin-top:4px;
  }
  .podium{
    display:flex; flex-direction:column; gap:10px;
    margin-top:16px;
  }
  .podium-row{
    display:flex; align-items:center; gap:12px;
    background:#F8FAF9; border-radius:14px; padding:10px 14px;
  }
  .podium-row.current{background:var(--sun-soft);}
  .podium-row.placeholder{opacity:.4;}
  .podium-row .medal{font-size:20px; width:24px; text-align:center; flex-shrink:0;}
  .podium-row .info{flex:1; min-width:0;}
  .podium-row .dur{
    font-family:'Quicksand', sans-serif; font-weight:700; font-size:16px; color:#2E3944;
  }
  .podium-row .date{font-size:11px; color:var(--text-dim); margin-top:1px;}

  .btn{
    width:100%;
    padding:14px 16px;
    border-radius:16px;
    border:none;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:transform .08s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn-relapse{
    background:var(--coral-soft);
    color:var(--coral);
    margin-top:18px;
  }
  .btn-relapse:hover{opacity:.85;}

  /* Weight section */
  .goal-row{
    display:flex; align-items:center; gap:10px; margin-bottom:16px;
  }
  .goal-row label{
    font-size:12px; color:var(--text-dim); white-space:nowrap; font-weight:500;
  }
  .goal-row input{
    flex:1;
    background:var(--mint-soft);
    border:none;
    color:var(--text);
    border-radius:12px;
    padding:10px 12px;
    font-family:'Inter', sans-serif;
    font-size:13px;
    font-weight:600;
  }

  .weight-stats{
    display:flex; justify-content:space-between; margin-bottom:16px;
  }
  .weight-stat{text-align:center; flex:1;}
  .weight-stat .num{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:21px;
    color:#2E3944;
  }
  .weight-stat .lbl{
    font-size:10px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:.06em;
    margin-top:2px;
    font-weight:500;
  }

  canvas{max-height:180px;}

  .entry-form{
    display:flex; align-items:stretch; gap:10px; margin-top:18px;
  }
  .entry-form input{
    flex:1;
    background:#F4F7F8;
    border:none;
    color:var(--text);
    border-radius:16px;
    padding:0 16px;
    font-size:15px;
    font-weight:500;
    height:48px;
  }
  .entry-form input:focus, .goal-row input:focus{
    outline:2px solid var(--mint);
  }
  .entry-form button{
    display:flex; align-items:center; justify-content:center;
    width:48px; height:48px;
    border-radius:16px;
    border:none;
    background:var(--mint);
    color:white;
    font-size:22px;
    line-height:1;
    cursor:pointer;
    flex-shrink:0;
  }
  .entry-form button:active{transform:scale(0.95);}

  .log{
    margin-top:16px;
    max-height:150px;
    overflow-y:auto;
  }
  .log-row{
    display:flex; justify-content:space-between; align-items:center;
    font-size:13px;
    color:var(--text-dim);
    padding:8px 4px;
    border-bottom:1px solid #F0F3F4;
  }
  .log-row .w{color:var(--text); font-weight:600;}
  .log-row button{
    background:none; border:none; color:var(--coral);
    cursor:pointer; font-size:12px; opacity:.6;
  }
  .log-row button:hover{opacity:1;}

  .empty{
    text-align:center; color:var(--text-dim); font-size:13px;
    padding:22px 0;
  }

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(58,71,80,.45);
    display:none; align-items:center; justify-content:center; z-index:10;
    padding:20px;
  }
  .modal-backdrop.show{display:flex;}
  .modal{
    background:var(--card); border-radius:22px; padding:24px; max-width:340px; width:100%;
  }
  .modal p{font-size:14px; line-height:1.5; color:var(--text-dim); margin:0 0 20px;}
  .modal .actions{display:flex; gap:10px;}
  .modal .actions button{flex:1; padding:12px; border-radius:14px; border:none; font-weight:600; cursor:pointer; font-size:14px;}
  .modal .cancel{background:#F4F7F8; color:var(--text);}
  .modal .confirm{background:var(--coral); color:white;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Личный журнал</div>
    <h1>Свобода 🕊️</h1>
  </header>

  <!-- Nicotine card -->
  <div class="card">
    <div class="card-head"><span class="icon">☀️</span><p class="card-title">Без никотина</p></div>
    <div class="quote sun-bg" id="quoteNicotine"></div>
    <div class="streak-hero">
      <span class="streak-num" id="streakDays">0</span>
      <span class="streak-unit">дней</span>
    </div>
    <div class="streak-sub" id="streakSub">0 ч 0 мин</div>
    <div class="podium" id="nicotinePodium"></div>

    <button class="btn btn-relapse" id="relapseBtn">Я сорвался — сбросить</button>
  </div>

  <!-- Weight card -->
  <div class="card">
    <div class="card-head"><span class="icon">🌱</span><p class="card-title">Вес</p></div>
    <div class="quote mint-bg" id="quoteWeight"></div>

    <div class="goal-row">
      <label for="goalInput">Цель, кг</label>
      <input type="number" id="goalInput" step="0.1" placeholder="напр. 78">
    </div>

    <div class="weight-stats">
      <div class="weight-stat">
        <div class="num" id="statCurrent">—</div>
        <div class="lbl">Сейчас</div>
      </div>
      <div class="weight-stat">
        <div class="num" id="statChange">—</div>
        <div class="lbl">С начала</div>
      </div>
      <div class="weight-stat">
        <div class="num" id="statToGoal">—</div>
        <div class="lbl">До цели</div>
      </div>
    </div>

    <canvas id="weightChart"></canvas>

    <div class="entry-form">
      <input type="number" id="weightInput" step="0.1" placeholder="Новый вес, кг">
      <button id="addWeightBtn">+</button>
    </div>

    <div class="log" id="weightLog"></div>
  </div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <p>Зафиксировать срыв? Текущий счётчик обнулится, но если это был рекорд — он сохранится.</p>
    <div class="actions">
      <button class="cancel" id="modalCancel">Отмена</button>
      <button class="confirm" id="modalConfirm">Да, сбросить</button>
    </div>
  </div>
</div>

<script>
// Local storage shim — mirrors the get/set(key,value)->{key,value} shape used elsewhere in this file,
// but backed by the browser's own localStorage instead of Claude's artifact storage.
const storage = {
  async get(key){
    const v = localStorage.getItem(key);
    if(v === null) throw new Error('not found');
    return { key, value: v };
  },
  async set(key, value){
    localStorage.setItem(key, value);
    return { key, value };
  }
};

// nicotineState.history holds completed streaks: {start, end, durationHours}
// nicotineState.currentStart is when the current (ongoing) streak began
let nicotineState = { currentStart: new Date().toISOString(), history: [] };
let weightEntries = [];
let goalWeight = null;
let chart = null;

const quotesNicotine = [
  "Каждый час без сигареты — это выбор, который ты делаешь сам. И ты его делаешь.",
  "Свобода — это не отсутствие желания, а умение сказать ему «не сегодня».",
  "Тело уже начинает лечиться прямо сейчас, пока ты читаешь это.",
  "Тяга длится минуты. Свобода — навсегда, если не сдаваться в эти минуты.",
  "Ты не отказываешься от чего-то. Ты возвращаешь себе воздух.",
  "Рекорд создаётся не в лучший день, а в тот, когда было труднее всего удержаться.",
  "Даже если сорвался — счётчик просто начинает новую историю, а не отменяет старую."
];
const quotesWeight = [
  "Прогресс редко бывает прямой линией — важно направление, а не идеальный график.",
  "Каждая цифра в журнале — это не оценка, а просто честная точка на пути.",
  "Тело меняется медленнее, чем хочется, и быстрее, чем кажется.",
  "Ты не соревнуешься со вчерашним весом — ты просто идёшь дальше.",
  "Маленькое стабильное движение к цели надёжнее резких рывков.",
  "Записывать вес — это забота о себе, а не суд над собой."
];

function pickQuote(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

async function loadData(){
  document.getElementById('quoteNicotine').textContent = pickQuote(quotesNicotine);
  document.getElementById('quoteWeight').textContent = pickQuote(quotesWeight);

  try{
    const r = await storage.get('nicotine-state');
    if(r && r.value){
      const loaded = JSON.parse(r.value);
      if(loaded.currentStart){
        // current format
        nicotineState = { currentStart: loaded.currentStart, history: Array.isArray(loaded.history) ? loaded.history : [] };
      } else if(loaded.lastReset){
        // migrate from old format {lastReset, bestStreak}
        nicotineState = { currentStart: loaded.lastReset, history: [] };
      }
    }
  }catch(e){}

  // backfill ids for any history entries saved before per-entry ids existed
  let idsFixed = false;
  (nicotineState.history || []).forEach((h, i) => {
    if(!h.id){ h.id = `${new Date(h.start).getTime()}-${i}`; idsFixed = true; }
  });
  if(idsFixed) await saveNicotine();

  try{
    const r = await storage.get('weight-entries');
    if(r && r.value) weightEntries = JSON.parse(r.value);
  }catch(e){}

  try{
    const r = await storage.get('goal-weight');
    if(r && r.value) goalWeight = JSON.parse(r.value);
  }catch(e){}

  document.getElementById('goalInput').value = goalWeight ?? '';
  renderWeight();
  updateStreak();
}

async function saveNicotine(){
  try{ await storage.set('nicotine-state', JSON.stringify(nicotineState)); }
  catch(e){ console.error('save failed', e); }
}
async function saveWeights(){
  try{ await storage.set('weight-entries', JSON.stringify(weightEntries)); }
  catch(e){ console.error('save failed', e); }
}
async function saveGoal(){
  try{ await storage.set('goal-weight', JSON.stringify(goalWeight)); }
  catch(e){ console.error('save failed', e); }
}

function updateStreak(){
  const now = Date.now();
  const start = new Date(nicotineState.currentStart).getTime();
  const diffMs = Math.max(0, now - start);
  const days = Math.floor(diffMs / 86400000);
  const hours = Math.floor((diffMs % 86400000) / 3600000);
  const mins = Math.floor((diffMs % 3600000) / 60000);

  document.getElementById('streakDays').textContent = days;
  document.getElementById('streakSub').textContent = `${hours} ч ${mins} мин`;

  renderNicotinePodium();
}
setInterval(updateStreak, 30000);

document.getElementById('relapseBtn').addEventListener('click', ()=>{
  document.getElementById('modalBackdrop').classList.add('show');
});
document.getElementById('modalCancel').addEventListener('click', ()=>{
  document.getElementById('modalBackdrop').classList.remove('show');
});
document.getElementById('modalConfirm').addEventListener('click', async ()=>{
  const nowIso = new Date().toISOString();
  const start = new Date(nicotineState.currentStart).getTime();
  const durationHours = Math.max(0, (Date.now() - start) / 3600000);

  nicotineState.history = nicotineState.history || [];
  // only skip near-zero durations, so an accidental double-tap doesn't spam the records
  // (this is a guard against double-clicks, not a filter on genuinely short streaks)
  if(durationHours >= 0.001){
    nicotineState.history.push({ id: Date.now().toString(), start: nicotineState.currentStart, end: nowIso, durationHours });
  }
  nicotineState.currentStart = nowIso;

  await saveNicotine();
  updateStreak();
  document.getElementById('modalBackdrop').classList.remove('show');
});

function formatDuration(hours){
  if(hours < 24) return `${Math.round(hours)} ч`;
  return `${(hours/24).toFixed(1)} дня`;
}

function renderNicotinePodium(){
  const history = nicotineState.history || [];
  const now = Date.now();
  const start = new Date(nicotineState.currentStart).getTime();
  const currentHours = Math.max(0, now - start) / 3600000;

  let items = history.map(h => ({ hours: h.durationHours, start: h.start, current: false }));
  // include the ongoing streak so it can compete for the record as it grows
  if(currentHours >= 0.001 || items.length === 0){
    items.push({ hours: currentHours, start: nicotineState.currentStart, current: true });
  }
  items.sort((a,b) => b.hours - a.hours);
  const record = items[0];

  const podiumEl = document.getElementById('nicotinePodium');
  if(record){
    const dateStr = new Date(record.start).toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit'});
    podiumEl.innerHTML = `<div class="podium-row ${record.current ? 'current' : ''}">
      <span class="medal">🥇</span>
      <div class="info">
        <div class="dur">${formatDuration(record.hours)}${record.current ? ' · сейчас' : ''}</div>
        <div class="date">с ${dateStr}</div>
      </div>
    </div>`;
  } else {
    podiumEl.innerHTML = `<div class="podium-row placeholder">
      <span class="medal">🥇</span>
      <div class="info"><div class="dur">—</div></div>
    </div>`;
  }
}


function renderWeight(){
  const sorted = [...weightEntries].sort((a,b)=> new Date(a.date) - new Date(b.date));

  const current = sorted.length ? sorted[sorted.length-1].weight : null;
  const first = sorted.length ? sorted[0].weight : null;
  document.getElementById('statCurrent').textContent = current !== null ? current.toFixed(1) : '—';
  document.getElementById('statChange').textContent = (current !== null && first !== null)
    ? (current - first >= 0 ? '+' : '') + (current - first).toFixed(1) : '—';
  document.getElementById('statToGoal').textContent = (current !== null && goalWeight)
    ? (current - goalWeight).toFixed(1) : '—';

  const labels = sorted.map(e => new Date(e.date).toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit'}));
  const data = sorted.map(e => e.weight);
  const datasets = [{
    label: 'Вес',
    data,
    borderColor: '#6FBE93',
    backgroundColor: 'rgba(111,190,147,0.15)',
    borderWidth: 2.5,
    tension: 0.4,
    pointRadius: 3,
    pointBackgroundColor: '#6FBE93',
    fill: true
  }];
  if(goalWeight){
    datasets.push({
      label: 'Цель',
      data: labels.map(()=> goalWeight),
      borderColor: '#F2A84E',
      borderDash: [4,4],
      borderWidth: 1.5,
      pointRadius: 0,
      fill: false
    });
  }

  try{
    const ctx = document.getElementById('weightChart').getContext('2d');
    if(chart) chart.destroy();
    if(typeof Chart !== 'undefined'){
      chart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#8A98A0', font: {size:10} }, grid: { display:false } },
            y: { ticks: { color: '#8A98A0', font: {size:10} }, grid: { color: 'rgba(58,71,80,0.06)' } }
          }
        }
      });
    }
  }catch(e){
    console.error('Chart render failed, continuing without graph', e);
  }

  const logEl = document.getElementById('weightLog');
  if(!sorted.length){
    logEl.innerHTML = '<div class="empty">Пока нет записей — добавь первый вес выше</div>';
    return;
  }
  logEl.innerHTML = [...sorted].reverse().map(e => `
    <div class="log-row">
      <span>${new Date(e.date).toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric'})}</span>
      <span class="w">${e.weight.toFixed(1)} кг</span>
      <button data-id="${e.id}">убрать</button>
    </div>
  `).join('');
  logEl.querySelectorAll('button[data-id]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      weightEntries = weightEntries.filter(e => e.id !== btn.dataset.id);
      await saveWeights();
      renderWeight();
    });
  });
}

document.getElementById('addWeightBtn').addEventListener('click', async ()=>{
  const input = document.getElementById('weightInput');
  const val = parseFloat(input.value);
  if(isNaN(val) || val <= 0 || val > 400) return;
  weightEntries.push({ id: Date.now().toString(), date: new Date().toISOString(), weight: val });
  await saveWeights();
  input.value = '';
  renderWeight();
});
document.getElementById('weightInput').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') document.getElementById('addWeightBtn').click();
});

document.getElementById('goalInput').addEventListener('change', async (e)=>{
  const v = parseFloat(e.target.value);
  goalWeight = isNaN(v) ? null : v;
  await saveGoal();
  renderWeight();
});

loadData();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed', err));
  });
}
</script>
</body>
</html>
